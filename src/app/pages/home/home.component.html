<app-header-image *ngIf="settings.header == 'image'" 
                [backgroundImage]="'assets/images/others/homepage.jpg'"
                [bgImageAnimate]="true"
                [contentOffsetToTop]="true"
                [title]="'Encuentra Tu Hogar no bbbEn Atlanta'"
                [desc]="'Compañía Líder En Real no Estate'"
                [isHomePage]="true"
                [fullscreen]="false">
</app-header-image> 

<app-header-carousel *ngIf="settings.header == 'carousel'" 
                    [slides]="slides" 
                    [contentOffsetToTop]="true"
                    [fullscreen]="false">
</app-header-carousel>

<app-header-map *ngIf="settings.header == 'map'" 
                [locations]="locations" 
                [contentOffsetToTop]="true"
                [fullscreen]="false">
</app-header-map>

<app-header-video *ngIf="settings.header == 'video'" 
        [backgroundVideo]="'assets/Videos/georgia_atlanta.mp4'" 
        [contentOffsetToTop]="true"
        [title]="'HOME.H_TITLE' | translate"
        [desc]="'HOME.H_DESC' | translate"
        [isHomePage]="true"
        [fullscreen]="true">
    </app-header-video>
            
<!-- Sección "Conoce a nuestra líder": video + tarjeta de stats a un lado y las
     tarjetas de Carmela al otro. Reemplaza al buscador/listado FMLS (inactivo).
     El markup FMLS original está en el historial de git para restaurarlo. -->
<div
  class="leader-section"
  style="background-image: url('assets/images/others/homepage.jpg')"
>
  <div class="leader-section__overlay"></div>
  <div class="leader-section__content px-3">
    <div class="theme-container">
      <h1 class="section-title">{{ "AGENTS.A_TITLE" | translate }}</h1>
      <div fxLayout="row wrap" fxLayoutAlign="space-around start">
        <div fxFlex="100" fxFlex.gt-sm="45" class="p-2">
          <app-videocontact></app-videocontact>
          <div class="mt-3">
            <app-agent-stats></app-agent-stats>
          </div>
        </div>
        <div fxFlex="100" fxFlex.gt-sm="50" class="p-2">
          <app-our-agents></app-our-agents>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Casos de éxito como grid de cards (identidad propia; el carrusel queda
     solo en /nosotros) -->
<app-success-cases-grid></app-success-cases-grid>

<app-testimonials></app-testimonials>
