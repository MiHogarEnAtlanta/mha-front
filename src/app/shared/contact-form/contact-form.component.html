<section class="">
  <div class="container">
    <form [formGroup]="contactForm" class="" id="contact">
      <h1 class="">Contact Us</h1>
      <h4>
        Leave us your information so We can contact you and find together your
        new home
      </h4>

      <div class="">
        <label for="name" class="">Name</label>
        <input
          matInput
          #name
          formControlName="name"
          type="text"
          id="name"
          name="name"
          class=""
          placeholder="Your name"
          autocomplete="name"
          autocapitalize="words"
          required
        />
      </div>

      <div class="">
        <label for="email" class="">Email</label>
        <input
          matInput
          #email
          formControlName="email"
          type="email"
          id="email"
          name="email"
          class=""
          placeholder="Your Email Address"
          autocomplete="email"
          autocapitalize="none"
          autocorrect="off"
          spellcheck="false"
          inputmode="email"
          required
        />
      </div>

      <div class="">
        <label for="tel" class="">Phone</label>
        <input
          matInput
          #tel
          formControlName="tel"
          type="tel"
          id="tel"
          name="tel"
          class=""
          placeholder="Your Phone Number"
          autocomplete="tel"
          inputmode="tel"
          required
        />
      </div>

      <div class="">
        <label for="message" class="">Message</label>
        <textarea
          matInput
          #message
          formControlName="message"
          id="message"
          name="message"
          class=""
          placeholder="Type your message here...."
        ></textarea>
      </div>

      <!-- Casilla de consentimiento SMS oculta temporalmente mientras el equipo
           completa el registro/aplicación A2P. Cambiar *ngIf a "true" (o
           quitarlo) para reactivarla. -->
      <div class="privacy-checkbox" *ngIf="false">
        <label>
          <input
            type="checkbox"
            name="agree"
            formControlName="agree"
          />
          <span class="text-muted small-text ml-2"
            >By checking this box, I consent to receive marketing and customer
            care SMS from Mi Hogar en Atlanta, reply STOP to opt-out; reply HELP
            for support; Message and data rates may apply; Messaging frequency
            may vary. Visit
            <a class="primary-text" href="privacy-policy" target="_blank"
              >here</a
            >
            to see our privacy policy and
            <a class="primary-text" href="terms-conditions" target="_blank"
              >here</a
            >
            for our Terms of Service.</span
          >
        </label>
      </div>

      <button
        mat-raised-button
        type="submit"
        class=""
        (click)="sendEmail()"
        [disabled]="contactForm.invalid"
      >
        Send
      </button>
    </form>
  </div>

</section>

<!-- Host de alertas: se monta en <body> en runtime para que el position:fixed
     se ancle al viewport y no quede atrapado por ancestros con transform/overflow -->
<div #alertHost>
  <!-- Side alert: envío exitoso -->
  <div class="side-alert side-alert--success" *ngIf="showSuccess">
    <span class="side-alert__icon">🎉</span>
    <div class="side-alert__body">
      <p class="side-alert__title">
        Thank you! Your information has been submitted successfully.
      </p>
      <p class="side-alert__text">We will contact you shortly</p>
    </div>
    <button
      type="button"
      class="side-alert__close"
      aria-label="Close"
      (click)="closePopup()"
    >
      &#x2715;
    </button>
  </div>

  <!-- Side alert: error de envío -->
  <div class="side-alert side-alert--error" *ngIf="showError">
    <span class="side-alert__icon">⚠️</span>
    <div class="side-alert__body">
      <p class="side-alert__title">Oops! Your message could not be sent.</p>
      <p class="side-alert__text">
        Please check your connection and try again.
      </p>
    </div>
    <button
      type="button"
      class="side-alert__close"
      aria-label="Close"
      (click)="closePopup()"
    >
      &#x2715;
    </button>
  </div>
</div>
